<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Arslan Malik 💙</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            font-size: 18px;
            animation: float 5s linear infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh);
                opacity: 0;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

        /* Card */
        .card {
            width: 90%;
            max-width: 350px;
            padding: 30px 20px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            text-align: center;
            color: white;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1s ease;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Name */
        .name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        /* Main Message */
        .main {
            font-size: 30px;
            font-weight: 700;
            color: #38bdf8;
            margin: 15px 0;
        }

        /* Sub Message */
        .sub {
            font-size: 15px;
            color: #e2e8f0;
            line-height: 1.6;
        }

        /* Button */
        button {
            margin-top: 25px;
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: white;
            color: #1e293b;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            max-width: 280px;
            transition: 0.4s;
            z-index: 10;
        }

        .modal.show {
            transform: translate(-50%, -50%) scale(1);
        }

        /* Overlay */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay"></div>

    <div class="card">
        <div class="name">Arslan Malik</div>

        <div class="main">I Love You 💙</div>

        <div class="sub">
            Not for anything special…<br>
            just for being you.<br><br>
            Always grateful to have you in my life 🤝
        </div>

        <button onclick="openModal()">Tap Here</button>
    </div>

    <div class="modal" id="modal">
        <h3>💙</h3>
        <p>
            Just a reminder…<br>
            you mean a lot to me.
        </p>
        <button onclick="closeModal()">Close</button>
    </div>

    <script>
        // hearts
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = ["💙", "💜", "🤍"][Math.floor(Math.random() * 3)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 10 + 15) + "px";
            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 400);

        // modal
        function openModal() {
            document.getElementById("modal").classList.add("show");
            document.getElementById("overlay").classList.add("show");
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("show");
            document.getElementById("overlay").classList.remove("show");
        }

        // close on outside click
        document.getElementById("overlay").onclick = closeModal;
    </script>

</body>

</html>
